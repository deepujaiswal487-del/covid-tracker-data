<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COVID-19 Death Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  background:#0a0e1a;
  color:#e2e8f0;
  font-family:'DM Sans', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#111827;
  padding:30px;
  border-radius:10px;
  width:350px;
}

input {
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#0a0e1a;
  border:1px solid #333;
  color:white;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#63b3ed;
  border:none;
  cursor:pointer;
}

.result {
  margin-top:20px;
  font-size:20px;
  color:#68d391;
}

.error {
  color:#fc8181;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>COVID Death Predictor</h2>

  <input type="number" id="confirmed" placeholder="Confirmed Cases">
  <input type="number" id="recovered" placeholder="Recovered Cases">
  <input type="number" id="active" placeholder="Active Cases">

  <button onclick="predict()">Predict</button>

  <div class="result" id="result"></div>
  <div class="error" id="error"></div>
</div>

<script>
async function predict() {
  const confirmed = document.getElementById('confirmed').value;
  const recovered = document.getElementById('recovered').value;
  const active = document.getElementById('active').value;

  const resultDiv = document.getElementById('result');
  const errorDiv = document.getElementById('error');

  resultDiv.innerHTML = "";
  errorDiv.innerHTML = "";

  if (!confirmed || !recovered || !active) {
    errorDiv.innerHTML = "Please fill all fields";
    return;
  }

  try {
    errorDiv.innerHTML = "⏳ Waking server... please wait";

    const response = await fetch(
      "https://ml-deepakj-covid-data-tracker.hf.space/run/predict",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          data: [
            Number(confirmed),
            Number(recovered),
            Number(active)
          ]
        })
      }
    );

    if (!response.ok) {
      throw new Error("Server not responding");
    }

    const data = await response.json();
    const prediction = Math.round(data.data[0]);

    errorDiv.innerHTML = "";
    resultDiv.innerHTML = "Predicted Deaths: " + prediction;

  } catch (err) {
    errorDiv.innerHTML = "⚠️ Hugging Face Space is sleeping. Try again in 20 seconds.";
  }
}
</script>

</body>
</html>
