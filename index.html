<script>
const API_URL = "https://ml-deepakj-covid-data-tracker.hf.space/run/predict";

async function predict() {
  const confirmed = parseFloat(document.getElementById('confirmed').value);
  const recovered = parseFloat(document.getElementById('recovered').value);
  const active = parseFloat(document.getElementById('active').value);

  const btn = document.getElementById('predictBtn');
  const errorBar = document.getElementById('errorBar');
  const resultCard = document.getElementById('resultCard');

  errorBar.style.display = "none";
  resultCard.classList.remove("visible");

  if (isNaN(confirmed) || isNaN(recovered) || isNaN(active)) {
    errorBar.textContent = "Please fill all fields";
    errorBar.style.display = "block";
    return;
  }

  btn.innerText = "Loading...";
  btn.disabled = true;

  try {
    const response = await fetchWithRetry(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        data: [confirmed, active, recovered] // IMPORTANT ORDER
      })
    });

    const result = await response.json();
    const deaths = result.data[0];

    document.getElementById("resultNumber").textContent =
      Math.round(deaths).toLocaleString();

    resultCard.classList.add("visible");

  } catch (err) {
    errorBar.textContent = "Server waking up... try again in 10 sec";
    errorBar.style.display = "block";
  }

  btn.innerText = "Run Prediction";
  btn.disabled = false;
}


// Retry logic (fix sleeping issue)
async function fetchWithRetry(url, options, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url, options);
      if (res.ok) return res;
    } catch (e) {}
    await new Promise(r => setTimeout(r, 5000));
  }
  throw new Error("Server not responding");
}
</script>
